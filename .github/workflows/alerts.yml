# Atlantic invest alerts: poll the latest TWOAT twice hourly, diff against the
# previous run's state (actions/cache), push alerts to ntfy.sh (NTFY_TOPIC
# repo secret; unset = the run is a harmless dry-run that just logs).
# tools/alert-invests.js documents the alert conditions.
#
# NOTE: GitHub disables cron schedules after ~60 days without repo activity —
# re-enable from the Actions tab if the repo goes quiet over the winter.
name: alerts
on:
  schedule:
    - cron: '7,37 * * * *' # twice hourly, off the congested :00/:30 marks
  workflow_dispatch:
    inputs:
      test:
        description: send a test ping to the ntfy topic
        type: boolean
        default: false
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: restore previous state
        uses: actions/cache/restore@v4
        with:
          path: state/alert-state.json
          key: alert-state-${{ github.run_id }} # never hits; restore-keys does
          restore-keys: alert-state-
      - name: check outlook and alert
        run: |
          mkdir -p state
          node tools/alert-invests.js ${{ inputs.test == true && '--test' || '' }}
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          ALERT_STATE: state/alert-state.json
      - name: save state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state/alert-state.json
          key: alert-state-${{ github.run_id }}
