# Archive foundation (Track C M1): every 6 hours fetch any new TWDAT/TWOAT/
# TWDEP/TWOEP issuances into archive/{year}/{basin}/, re-derive the compact
# per-basin summaries under archive/derived/, and commit the result to main.
# Raw NHC text is ground truth (committed); derived JSON is regenerated by
# --derive, never hand-edited. tools/archive-sync.js documents the layout and
# the idempotent skip-existing behavior. Also captures ATCF working best-track
# snapshots (Track C M5, tools/bdeck-sync.js) — b-decks mutate in place, so
# each 6h cycle is the only chance to record their in-season evolution.
#
# NOTE: GitHub cron is best-effort — runs get delayed or dropped under load, and
# GitHub disables cron schedules after ~60 days without repo activity. This
# workflow's own commits keep the repo active, so once merged it is largely
# self-sustaining; re-enable from the Actions tab if the repo goes fully quiet.
# Commits pushed with the built-in GITHUB_TOKEN do NOT re-trigger workflows, so
# there is no CI loop / recursion from the archive commit landing on main.
name: archive
on:
  schedule:
    - cron: '23 1,7,13,19 * * *' # ~1h after the 00/06/12/18Z issuances, off the marks
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: archive
  cancel-in-progress: false # never abort a run mid-fetch; let it finish and commit
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: fetch new issuances and re-derive
        run: node tools/archive-sync.js --derive
      - name: rebuild season lineage (Track C M2)
        # composes the chains + genesis links into archive/derived/lineage-2026.json
        # — under archive/, so the commit step below already stages it
        run: node tools/build-lineage.js
      - name: rebuild genesis truth ledger (Track C M4)
        # per-statement 48h/7d verdicts + season calibration over lineage-2026.json
        # -> archive/derived/genesis-2026.json — deterministic ("now" is the max
        # archive stamp, never wall-clock), staged by the same commit step
        run: node tools/build-genesis-ledger.js
      - name: sync ATCF b-deck snapshots (Track C M5)
        # working best tracks mutate in place; bdeck-sync.js writes content-
        # stamped snapshots under archive/{year}/atcf/ — staged by the same
        # commit step below
        run: node tools/bdeck-sync.js
      - name: rebuild b-deck truth overlay (Track C M6)
        # cross-checks ledger verdicts + lineage chains against the captured
        # best tracks -> archive/derived/bdeck-truth-2026.json; flags
        # disagreements, never rewrites the ledger — staged by the same commit
        run: node tools/bdeck-truth.js
      - name: derive app-loadable best tracks (Track C M7)
        # compact tracks + per-tag truth badges for the app's history overlay
        # -> archive/derived/bdeck-tracks-2026.json (embeds the M6 agreements,
        # so it runs after bdeck-truth) — staged by the same commit
        run: node tools/derive-bdeck-tracks.js
      - name: commit new archive data
        run: |
          if [ -z "$(git status --porcelain archive/)" ]; then
            echo "no new archive data — nothing to commit"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add archive/
          git commit -m 'chore(archive): sync NHC text + b-decks + re-derive'
          # one rebase retry if another run (or a human push) landed first;
          # explicit remote/branch — the runner checkout has no upstream config
          git push || (git pull --rebase origin main && git push)
