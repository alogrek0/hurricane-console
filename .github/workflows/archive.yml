# Archive foundation (Track C M1): every 6 hours fetch any new TWDAT/TWOAT/
# TWDEP/TWOEP issuances into archive/{year}/{basin}/, re-derive the compact
# per-basin summaries under archive/derived/, and commit the result to main.
# Raw NHC text is ground truth (committed); derived JSON is regenerated by
# --derive, never hand-edited. tools/archive-sync.js documents the layout and
# the idempotent skip-existing behavior.
#
# NOTE: GitHub cron is best-effort — runs get delayed or dropped under load, and
# GitHub disables cron schedules after ~60 days without repo activity. This
# workflow's own commits keep the repo active, so once merged it is largely
# self-sustaining; re-enable from the Actions tab if the repo goes fully quiet.
# Commits pushed with the built-in GITHUB_TOKEN do NOT re-trigger workflows, so
# there is no CI loop / recursion from the archive commit landing on main.
name: archive
on:
  schedule:
    - cron: '23 1,7,13,19 * * *' # ~1h after the 00/06/12/18Z issuances, off the marks
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: archive
  cancel-in-progress: false # never abort a run mid-fetch; let it finish and commit
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: fetch new issuances and re-derive
        run: node tools/archive-sync.js --derive
      - name: rebuild season lineage (Track C M2)
        # composes the chains + genesis links into archive/derived/lineage-2026.json
        # — under archive/, so the commit step below already stages it
        run: node tools/build-lineage.js
      - name: commit new archive data
        run: |
          if [ -z "$(git status --porcelain archive/)" ]; then
            echo "no new archive data — nothing to commit"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add archive/
          git commit -m 'chore(archive): sync NHC text + re-derive'
          # one rebase retry if another run (or a human push) landed first;
          # explicit remote/branch — the runner checkout has no upstream config
          git push || (git pull --rebase origin main && git push)
