<!DOCTYPE html>
<!--
  tools/icon-lab.html — dev-only icon + favicon treatment lab. Never shipped as
  part of the app (not in the SW SHELL list, not referenced by index.html), but
  IS reachable on a phone because Pages serves the repo root:
    https://<user>.github.io/hurricane-console/tools/icon-lab.html

  Built fresh from the user's home-screen screenshot (IMG_8070): the classic
  tropical-cyclone symbol — a central eye (ring + dot) with two bold round-capped
  spiral hooks in 180° rotational symmetry — over a faint steel chart graticule
  on the navy tile. NOTHING is carried over from the old thin swirl.

  LARGE icons (icon-192/512, maskable, apple-touch-180) ship the full graticule —
  the screenshot look, shown at top. The FAVICON simplifies; three candidates,
  most-detail to least, judged at true 16px:
    A  full graticule + hooks   (screenshot-faithful)
    B  center crosshair + hooks (reticle hint, survives small)
    C  hooks + eye only         (grid dropped, bolder for legibility)

  One parameterized iconSVG() so what you judge is what ships. Each favicon card
  prints its exact favicon.svg source; the LARGE card prints the make-icons.html
  constants. Pick A/B/C at 16px, tell me, and I regenerate the PNG set + favicon.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Icon lab — Hurricane Console (dev)</title>
<style>
  :root{
    --bg:#071620; --panel:#0c2233; --line:#173347; --ink:#dce8ef;
    --dim:#7ea3b8; --amber:#ffa23a;
    --mono:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.45 var(--mono)}
  header.top{padding:.6rem .8rem;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#0a1e2c,#071620)}
  h1{margin:0;font-size:.95rem;letter-spacing:.02em}
  h1 small{display:block;color:var(--dim);font-weight:400;font-size:.7rem;letter-spacing:.06em}
  .wrap{padding:1rem;display:flex;flex-direction:column;gap:1.2rem;max-width:900px}
  section{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:.8rem}
  section>b{display:block;color:var(--dim);font-size:.62rem;letter-spacing:.1em;margin-bottom:.55rem}
  section.hero{border-color:#2b5a72}

  .tabstrip{display:flex;align-items:flex-end;gap:0;padding:6px 8px 0;border-radius:8px 8px 0 0;margin-bottom:2px}
  .tabstrip.light{background:#dee1e6}
  .tabstrip.dark{background:#202124}
  .tab{display:flex;align-items:center;gap:8px;padding:7px 14px;border-radius:8px 8px 0 0;
    font:12px system-ui,-apple-system,"Segoe UI",sans-serif;white-space:nowrap;min-width:0}
  .light .tab{background:#fff;color:#202124}
  .dark .tab{background:#323639;color:#e8eaed}
  .tab img{width:16px;height:16px;flex:none}
  .tab span{overflow:hidden;text-overflow:ellipsis}

  .ramp{display:flex;gap:1.4rem;flex-wrap:wrap;align-items:flex-end}
  .cell{text-align:center}
  .cell i{display:block;font-style:normal;color:var(--dim);font-size:.62rem;margin-top:.3rem}
  .ground{display:inline-flex;gap:12px;align-items:flex-end;padding:10px;border-radius:6px}
  .ground.light{background:#f1f3f4}
  .ground.dark{background:#26282b}

  details{margin-top:.5rem}
  summary{cursor:pointer;color:var(--dim);font-size:.72rem}
  pre{margin:.4rem 0 0;padding:.6rem;background:#04101a;border:1px solid var(--line);
    border-radius:6px;font-size:.66rem;line-height:1.5;overflow-x:auto;color:#a8c6d8}
  .note{color:var(--dim);font-size:.72rem;margin:.35rem 0 0}
  .home{display:inline-flex;flex-direction:column;align-items:center;gap:6px}
  .home i{color:var(--dim);font-size:.62rem;font-style:normal}
</style>
</head>
<body>
<header class="top">
  <h1>Icon lab <small>dev only — cyclone + graticule traced from your screenshot; LARGE keeps the full grid, pick the FAVICON reduction (A/B/C) at 16px</small></h1>
</header>
<div class="wrap" id="wrap"></div>
<script>
  'use strict';
  var BG = '#071620', AMBER = '#ffa23a', GRAT = '#6f9bb3';
  var uid = 0;

  // One arm of the cyclone (upper-right open crescent); the other is this rotated
  // 180° about the eye at (12,12). Round caps. An open spiral arm — starts above
  // the eye with a gap, bulges up-right, tail curls back down. Tuned to IMG_8070.
  var ARM = 'M11.4 9.6 C13.6 8.0 16.4 8.4 17.2 10.8 C17.7 12.3 17.0 13.4 15.8 13.6';

  // o: rx, bleed, grat('grid'|'cross'|'none'), gw, gop, hookW, eyeR, eyeW, dotR
  function iconSVG(o) {
    var id = 'c' + (++uid);
    var L = [];
    L.push('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">');
    L.push(o.bleed
      ? '  <rect width="24" height="24" fill="' + BG + '"/>'
      : '  <rect width="24" height="24" rx="' + o.rx + '" fill="' + BG + '"/>');
    if (o.grat && o.grat !== 'none') {
      var shape = o.bleed ? '<rect width="24" height="24"/>'
                          : '<rect width="24" height="24" rx="' + o.rx + '"/>';
      L.push('  <clipPath id="' + id + '">' + shape + '</clipPath>');
      L.push('  <g clip-path="url(#' + id + ')" stroke="' + GRAT +
             '" stroke-width="' + o.gw + '" stroke-opacity="' + o.gop + '">');
      // centered crosshair (always present when grat on)
      L.push('    <path d="M12 2.5V21.5M2.5 12H21.5"/>');
      if (o.grat === 'grid') {
        // two offset parallels each side of the crosshair -> chart grid cells
        L.push('    <path d="M7 4V20M17 4V20M4 7H20M4 17H20"/>');
      }
      L.push('  </g>');
    }
    // hooks (amber, bold, round-capped) — arm + 180° rotation
    L.push('  <g fill="none" stroke="' + AMBER + '" stroke-width="' + o.hookW + '" stroke-linecap="round">');
    L.push('    <path d="' + ARM + '"/>');
    L.push('    <path d="' + ARM + '" transform="rotate(180 12 12)"/>');
    L.push('  </g>');
    // eye: ring + center dot
    L.push('  <circle cx="12" cy="12" r="' + o.eyeR + '" fill="none" stroke="' + AMBER + '" stroke-width="' + o.eyeW + '"/>');
    L.push('  <circle cx="12" cy="12" r="' + o.dotR + '" fill="' + AMBER + '"/>');
    L.push('</svg>');
    return L.join('\n');
  }
  function uri(src){ return 'data:image/svg+xml,' + encodeURIComponent(src); }
  function el(html){ var d = document.createElement('div'); d.innerHTML = html.trim(); return d.firstChild; }
  var wrap = document.getElementById('wrap');

  var GLYPH = { hookW:2.4, eyeR:1.5, eyeW:1.1, dotR:0.6 };

  // ---- LARGE icons: full graticule (always ships) ----
  var anyTile   = iconSVG(Object.assign({ rx:4.5, grat:'grid', gw:0.5, gop:0.6 }, GLYPH));
  var appleBleed= iconSVG(Object.assign({ bleed:true, grat:'grid', gw:0.5, gop:0.6 }, GLYPH));
  var hero = el('<section class="hero"><b>LARGE ICONS — full graticule (matches your home-screen screenshot; ships to icon-192/512, maskable, apple-touch-180)</b></section>');
  var heroRow = el('<div class="ramp"></div>');
  [['icon-192/512 (rounded tile)', anyTile, 4.5],
   ['apple-touch / maskable (full-bleed)', appleBleed, 0]].forEach(function(pair){
    var box = el('<div class="home"></div>');
    var img = new Image(); img.src = uri(pair[1]); img.width = 128; img.height = 128;
    if (pair[2]) img.style.borderRadius = (128 * pair[2] / 24) + 'px';
    box.appendChild(img); box.appendChild(el('<i>' + pair[0] + '</i>'));
    heroRow.appendChild(box);
  });
  hero.appendChild(heroRow);
  hero.appendChild(el('<p class="note">Confirm this reads like your screenshot. Graticule steel ' + GRAT + '; hooks/eye amber. Tell me to adjust hook curl/weight, eye size, or grid density/opacity.</p>'));
  var d1 = el('<details><summary>make-icons.html art + constants</summary><pre></pre></details>');
  d1.querySelector('pre').textContent =
    'BG ' + BG + '  AMBER ' + AMBER + '  GRAT ' + GRAT + '\n' +
    'hookW ' + GLYPH.hookW + '  eyeR ' + GLYPH.eyeR + '  eyeW ' + GLYPH.eyeW + '  dotR ' + GLYPH.dotR + '\n' +
    'ARM ' + ARM + '  (+ rotate(180 12 12) for the mirror)\n\n// full "any" tile source:\n' + anyTile;
  hero.appendChild(d1);
  wrap.appendChild(hero);

  // ---- FAVICON candidates ----
  var CANDIDATES = [
    { id:'A', label:'A — full graticule + hooks (screenshot-faithful)',
      cfg:Object.assign({ rx:5.4, grat:'grid', gw:0.6, gop:0.7 }, GLYPH) },
    { id:'B', label:'B — center crosshair + hooks (reticle hint)',
      cfg:Object.assign({ rx:5.4, grat:'cross', gw:0.8, gop:0.7, hookW:2.5 }, GLYPH) },
    { id:'C', label:'C — hooks + eye only (grid dropped, bolder for 16px)',
      cfg:Object.assign({}, GLYPH, { rx:5.4, grat:'none', hookW:2.6, eyeR:1.8, dotR:0.75 }) }
  ];
  var SIZES = [16, 32, 64, 128];

  CANDIDATES.forEach(function(c){
    var src = iconSVG(c.cfg), u = uri(src);
    var sec = el('<section><b>' + c.label + '</b></section>');
    ['light','dark'].forEach(function(theme){
      sec.appendChild(el('<div class="tabstrip ' + theme + '"><div class="tab">' +
        '<img src="' + u + '" alt=""><span>Hurricane Console — TWDAT</span></div></div>'));
    });
    var ramp = el('<div class="ramp"></div>');
    ['light','dark'].forEach(function(theme){
      var g = el('<div class="ground ' + theme + '"></div>');
      SIZES.forEach(function(s){
        g.appendChild(el('<div class="cell"><img src="' + u + '" width="' + s + '" height="' + s + '" alt=""><i>' + s + '</i></div>'));
      });
      ramp.appendChild(g);
    });
    sec.appendChild(ramp);
    var det = el('<details><summary>favicon.svg source (' + c.id + ')</summary><pre></pre></details>');
    det.querySelector('pre').textContent = src;
    sec.appendChild(det);
    wrap.appendChild(sec);
  });
</script>
</body>
</html>
